server {
    # No HOCON default: SERVER_PORT is a JVM+iOS value, so it lives once in the
    # dotenv layer (.env) and HOCON pulls it from the env with a required ${VAR}.
    port = ${SERVER_PORT}
    host = "0.0.0.0"
    host = ${?SERVER_HOST}
    requestSize {
        maxSize = "8 KiB"
        maxSize = ${?SERVER_MAX_REQUEST_SIZE}
        routeOverrides {
            "/api/v1/auth/register" = "1 KiB"
        }
        routePrefixOverrides {
            "/api/v1/conversations" = "512 KiB"
        }
    }
}

session {
    cookieName = "UNICOACH_SESSION"
    cookieName = ${?SESSION_COOKIE_NAME}
    # No HOCON default: APP_DOMAIN is a JVM+Shell+iOS+Terraform value, so it lives
    # once in the dotenv layer (.env) and HOCON pulls it with a required ${VAR}.
    cookieDomain = ${APP_DOMAIN}
    cookieSecure = false
    cookieSecure = ${?SESSION_COOKIE_SECURE}
    expiration = "7d"
    expiration = ${?SESSION_EXPIRATION}
}

sessionExpiry {
    ignorePathPrefixes = ["/health", "/api/v1/auth/logout"]
}

clientKeyGate {
    keys = ""
    keys = ${?UNICOACH_CLIENT_KEYS}
    allowlistPaths = ["/healthz"]
}
