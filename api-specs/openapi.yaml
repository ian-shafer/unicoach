openapi: 3.0.3
info:
  title: Unicoach REST API
  description: Foundation "Hello World" OpenAPI spec verifying the infrastructure and routing.
  version: 1.0.0
paths:
  /hello:
    get:
      summary: Hello World
      description: Returns a friendly string validating that the Ktor REST server is alive.
      operationId: getHello
      responses:
        '200':
          description: Successful greeting
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
                example: "Hello, Ian. I love you 😘"

  /api/v1/auth/register:
    post:
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User successfully registered
          headers:
            Set-Cookie:
              schema:
                type: string
              description: The opaque session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/me:
    get:
      summary: Get current authenticated user
      operationId: getCurrentUser
      parameters:
        - in: cookie
          name: unicoach_session
          schema:
            type: string
          required: true
          description: The opaque session token cookie
      responses:
        '200':
          description: Authenticated user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      summary: Logout current user
      operationId: logoutUser
      responses:
        '204':
          description: Session successfully revoked and cookie cleared
          headers:
            Set-Cookie:
              schema:
                type: string
              description: The cleared session cookie
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
        name:
          type: string
    PublicUser:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
    RegisterResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/PublicUser'
    MeResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/PublicUser'
    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

