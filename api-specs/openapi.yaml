openapi: 3.0.3
info:
  title: Unicoach REST API
  description: REST API for the Unicoach product surface (auth, students, conversations).
  version: 1.0.0
paths:
  /api/v1/auth/register:
    post:
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User successfully registered
          headers:
            Set-Cookie:
              schema:
                type: string
              description: The opaque session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds the configured size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Request body could not be deserialized into the expected shape
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      summary: Login a user
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: User successfully authenticated
          headers:
            Set-Cookie:
              schema:
                type: string
              description: The opaque session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Malformed request body (e.g. wrong JSON value types)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds the configured size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Request body could not be deserialized into the expected shape
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/me:
    get:
      summary: Get current authenticated user
      operationId: getCurrentUser
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Authenticated user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      summary: Logout current user
      operationId: logoutUser
      responses:
        '204':
          description: Session successfully revoked and cookie cleared
          headers:
            Set-Cookie:
              schema:
                type: string
              description: The cleared session cookie
        '413':
          description: Request body exceeds the configured size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/students:
    post:
      summary: Create the current user's student profile
      description: >
        Creates the owner-resolved student profile for the authenticated user.
        The resource is a per-user singleton; there is no path identifier.
      operationId: createStudent
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudentRequest'
      responses:
        '201':
          description: Student profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds the configured size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A student profile already exists for the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Request body could not be deserialized into the expected shape
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/students/me:
    get:
      summary: Get the current user's student profile
      operationId: getStudentMe
      security:
        - cookieAuth: []
      responses:
        '200':
          description: The authenticated user's student profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: The user has no student profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update the current user's student profile
      operationId: updateStudentMe
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudentRequest'
      responses:
        '200':
          description: Student profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds the configured size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: The user has no student profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Optimistic concurrency version conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Request body could not be deserialized into the expected shape
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete the current user's student profile and account
      description: >
        Soft-deletes the student row and the owning user row atomically and
        clears the session cookie. All sessions are invalidated.
      operationId: deleteStudentMe
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Student profile and account deleted; session cookie cleared
          headers:
            Set-Cookie:
              schema:
                type: string
              description: The cleared session cookie
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: The user has no student profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/conversations:
    post:
      summary: Start a conversation with its first message
      description: >
        Creates a conversation owned by the caller's student and records the first
        user turn, returning the conversation plus the buffered coach reply.
        The name is derived from the first message when not supplied.
      operationId: createConversation
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201':
          description: Conversation started; first turn recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConversationResponse'
        '400':
          description: Validation failure (empty/oversized message, invalid name)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds the configured size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The caller has no student profile (code student_profile_required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List the caller's conversations
      operationId: listConversations
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [active, archived]
            default: active
          description: active returns non-archived conversations; archived returns archived ones. Deleted conversations are never returned.
      responses:
        '200':
          description: The caller's conversations, most recent activity first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/conversations/stream:
    post:
      summary: Start a conversation and stream the first reply
      description: >
        As createConversation, but streams the coach's first reply as
        Server-Sent Events. The stream opens with a conversation event carrying the
        new conversation id and the persisted user message, then emits delta events,
        and terminates with a single message or error event.
      operationId: streamConversation
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '200':
          description: SSE stream of the first turn
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/StreamEvent'
        '400':
          description: Validation failure (rejected before the stream opens)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds the configured size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The caller has no student profile (code student_profile_required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/conversations/{conversationId}:
    parameters:
      - in: path
        name: conversationId
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Fetch a conversation
      operationId: getConversation
      security:
        - cookieAuth: []
      responses:
        '200':
          description: The conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such conversation owned by the caller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Rename and/or archive a conversation
      operationId: updateConversation
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConversationRequest'
      responses:
        '200':
          description: Updated conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '400':
          description: Validation failure (empty body, invalid name)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such conversation owned by the caller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete (soft-delete) a conversation
      description: >
        Soft-deletes the conversation: it leaves all listings and can no longer be
        fetched. The underlying transcript is preserved as the memory source of
        truth. Distinct from archive, which is reversible.
      operationId: deleteConversation
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Conversation deleted
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such conversation owned by the caller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/conversations/{conversationId}/messages:
    parameters:
      - in: path
        name: conversationId
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Fetch the message history
      description: Returns all messages in the conversation in chronological order (oldest first).
      operationId: listMessages
      security:
        - cookieAuth: []
      responses:
        '200':
          description: The conversation's messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such conversation owned by the caller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Post a user message and receive the coach reply
      operationId: postMessage
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostMessageRequest'
      responses:
        '201':
          description: The turn was recorded; the user and coach messages are returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostMessageResponse'
        '400':
          description: Validation failure (empty/oversized message)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds the configured size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such conversation owned by the caller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/conversations/{conversationId}/messages/stream:
    parameters:
      - in: path
        name: conversationId
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Post a user message and stream the coach reply
      description: >
        As postMessage, but streams the reply as Server-Sent Events. The stream
        opens with a user_message event echoing the persisted user message, then
        emits delta events, and terminates with a single message or error event.
      operationId: streamMessage
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostMessageRequest'
      responses:
        '200':
          description: SSE stream of the turn
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/StreamEvent'
        '400':
          description: Validation failure (rejected before the stream opens)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds the configured size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No such conversation owned by the caller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: UNICOACH_SESSION
  schemas:
    RegisterRequest:
      type: object
      additionalProperties: false
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: >
            Must be 8-128 characters and contain at least one uppercase letter,
            one lowercase letter, and one digit (enforced by the server's
            RegistrationValidator). The pattern encodes that policy so the
            contract is honest and fuzzers generate acceptable values.
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9]).{8,128}$'
        name:
          type: string
          minLength: 1
          description: Must not be blank (server rejects a blank name).
    PublicUser:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
    RegisterResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/PublicUser'
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/PublicUser'
    MeResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/PublicUser'
    CreateStudentRequest:
      type: object
      additionalProperties: false
      required: [expectedHighSchoolGraduationDate]
      properties:
        expectedHighSchoolGraduationDate:
          type: string
          description: >
            Variable-precision expected high-school graduation date in
            zero-padded canonical ISO form: YYYY, YYYY-MM, or YYYY-MM-DD.
          pattern: '^[0-9]{4}(-[0-9]{2}(-[0-9]{2})?)?$'
          example: "2028-06-15"
    UpdateStudentRequest:
      type: object
      additionalProperties: false
      required: [expectedHighSchoolGraduationDate, version]
      properties:
        expectedHighSchoolGraduationDate:
          type: string
          description: >
            Variable-precision expected high-school graduation date in
            zero-padded canonical ISO form: YYYY, YYYY-MM, or YYYY-MM-DD.
          pattern: '^[0-9]{4}(-[0-9]{2}(-[0-9]{2})?)?$'
          example: "2028-06"
        version:
          type: integer
          format: int32
          description: Optimistic-concurrency version the client last observed.
    PublicStudent:
      type: object
      required: [id, expectedHighSchoolGraduationDate, version, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        expectedHighSchoolGraduationDate:
          type: string
          description: Zero-padded ISO at the stored precision (YYYY | YYYY-MM | YYYY-MM-DD).
          pattern: '^[0-9]{4}(-[0-9]{2}(-[0-9]{2})?)?$'
        version:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    StudentResponse:
      type: object
      required: [student]
      properties:
        student:
          $ref: '#/components/schemas/PublicStudent'
    Conversation:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 255
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          description: Advances on rename only; not on new messages.
        lastActivityAt:
          type: string
          format: date-time
          nullable: true
          description: >
            Derived MAX(convo_requests.created_at). Null for a conversation with no
            turns yet. Use this — not updatedAt — to sort the chat list by recency.
        archivedAt:
          type: string
          format: date-time
          nullable: true
          description: Non-null when the conversation is archived; null when active.
    Message:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: string
          description: >
            Opaque, stable message id. Clients must not parse it or assume ordering.
        role:
          type: string
          enum: [user, coach]
        content:
          type: string
          description: Rendered message text projected from the stored content blocks.
        createdAt:
          type: string
          format: date-time
    CreateConversationRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 100000
          description: The first user message; the conversation name is derived from it when name is omitted.
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Optional caller-supplied name; server derives one from the first message when absent.
    PostMessageRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 100000
          description: The user message text. Named to match CreateConversationRequest.message; both carry the same concept.
    UpdateConversationRequest:
      type: object
      minProperties: 1
      description: At least one field must be present. Conversations are unversioned; no version field.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        archived:
          type: boolean
          description: true archives (sets archivedAt); false unarchives (clears archivedAt).
    ConversationResponse:
      type: object
      required: [conversation]
      properties:
        conversation:
          $ref: '#/components/schemas/Conversation'
    ConversationListResponse:
      type: object
      required: [conversations]
      properties:
        conversations:
          type: array
          items:
            $ref: '#/components/schemas/Conversation'
    CreateConversationResponse:
      type: object
      required: [conversation, userMessage, coachMessage]
      properties:
        conversation:
          $ref: '#/components/schemas/Conversation'
        userMessage:
          $ref: '#/components/schemas/Message'
        coachMessage:
          $ref: '#/components/schemas/Message'
    PostMessageResponse:
      type: object
      required: [userMessage, coachMessage]
      properties:
        userMessage:
          $ref: '#/components/schemas/Message'
        coachMessage:
          $ref: '#/components/schemas/Message'
    MessageListResponse:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
    ConversationCreatedEvent:
      type: object
      required: [type, conversation, userMessage]
      properties:
        type:
          type: string
          enum: [conversation]
        conversation:
          $ref: '#/components/schemas/Conversation'
        userMessage:
          $ref: '#/components/schemas/Message'
    UserMessageEvent:
      type: object
      required: [type, userMessage]
      properties:
        type:
          type: string
          enum: [user_message]
        userMessage:
          $ref: '#/components/schemas/Message'
    MessageDeltaEvent:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [delta]
        text:
          type: string
          description: A token/text fragment of the coach reply, appended in order.
    MessageCompletedEvent:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [message]
        message:
          $ref: '#/components/schemas/Message'
          description: The persisted coach message (see Streaming protocol for the delta-concatenation guarantee).
    StreamErrorEvent:
      type: object
      required: [type, error]
      properties:
        type:
          type: string
          enum: [error]
        error:
          $ref: '#/components/schemas/ErrorResponse'
    StreamEvent:
      oneOf:
        - $ref: '#/components/schemas/ConversationCreatedEvent'
        - $ref: '#/components/schemas/UserMessageEvent'
        - $ref: '#/components/schemas/MessageDeltaEvent'
        - $ref: '#/components/schemas/MessageCompletedEvent'
        - $ref: '#/components/schemas/StreamErrorEvent'
      discriminator:
        propertyName: type
        mapping:
          conversation: '#/components/schemas/ConversationCreatedEvent'
          user_message: '#/components/schemas/UserMessageEvent'
          delta: '#/components/schemas/MessageDeltaEvent'
          message: '#/components/schemas/MessageCompletedEvent'
          error: '#/components/schemas/StreamErrorEvent'
    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        fieldErrors:
          type: array
          nullable: true
          description: >
            Per-field validation detail. The server emits this key explicitly as
            null when an error carries no field-level detail (e.g. 401, 409), so
            it is nullable as well as optional.
          items:
            $ref: '#/components/schemas/FieldError'

