[checks.negative_data_rejection]
expected-statuses = ["400", "401", "403", "404", "405", "406", "409", "413", "422", "428", "5xx"]

# A schema-valid request can still be a semantically-invalid credential: the
# email-verification endpoint (RFC 65) returns a documented 400 (invalid_token /
# token_expired / token_already_used) for any token that is well-formed but not a
# live, unconsumed token — which is every token Schemathesis generates. 400 is
# therefore an accepted positive-data outcome alongside the defaults, mirroring
# how login's wrong-password 401 is already tolerated.
[checks.positive_data_acceptance]
expected-statuses = ["2xx", "400", "401", "403", "404", "409", "5xx"]
