services:
  queue-worker:
    image: eclipse-temurin:21-jdk
    user: "${HOST_UID}:${HOST_GID}"
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - GRADLE_USER_HOME=/workspace/var/gradle-queue-worker
      - HOME=/workspace/var/gradle-queue-worker
      - DATABASE_JDBCURL=${DATABASE_JDBCURL:-jdbc:postgresql://postgres:5432/unicoach}
      - DATABASE_USER=${DATABASE_USER:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-}
      - HEALTH_NONCE=${HEALTH_NONCE}
      - RUN_DIR=/workspace/var/run
      - SERVICE_NAME=queue-worker
    command: ["./gradlew", ":queue-worker:run", "--project-cache-dir", "/workspace/var/gradle-queue-worker/.project-cache"]
    healthcheck:
      test: ["CMD-SHELL", '[ "$(cat /workspace/var/run/$$SERVICE_NAME.check 2>/dev/null)" = "$$HEALTH_NONCE" ]']
      interval: 200ms
      timeout: 5s
      retries: 12
      start_period: 30s

networks:
  default:
    name: ${UNICOACH_NETWORK:-unicoach-network}
