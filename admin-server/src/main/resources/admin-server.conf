admin {
  server {
    host = "127.0.0.1"
    host = ${?ADMIN_SERVER_HOST}
    port = 8081
    port = ${?ADMIN_SERVER_PORT}
  }
  session {
    cookieName    = "admin_session"
    cookieDomain  = ""        # empty => host-only cookie
    cookieDomain  = ${?ADMIN_COOKIE_DOMAIN}
    cookieSecure  = false
    cookieSecure  = ${?ADMIN_COOKIE_SECURE}
    expirationSeconds = 86400
  }
  display {
    timezone       = "UTC"
    timezone       = ${?ADMIN_DISPLAY_TIMEZONE}
    idLinkGlyph    = "🔗"
    idLinkGlyph    = ${?ADMIN_ID_LINK_GLYPH}
    boolTrueGlyph  = "✓"
    boolTrueGlyph  = ${?ADMIN_BOOL_TRUE_GLYPH}
    boolFalseGlyph = "✗"
    boolFalseGlyph = ${?ADMIN_BOOL_FALSE_GLYPH}
    idTailChars    = 8
    idTailChars    = ${?ADMIN_ID_TAIL_CHARS}
    copyGlyph      = "⧉"
    copyGlyph      = ${?ADMIN_COPY_GLYPH}
  }
}
