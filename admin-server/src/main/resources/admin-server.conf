admin {
  server {
    host = "127.0.0.1"
    host = ${?ADMIN_SERVER_HOST}
    port = 8081
    port = ${?ADMIN_SERVER_PORT}
  }
  session {
    cookieName    = "admin_session"
    cookieDomain  = ""        # empty => host-only cookie
    cookieDomain  = ${?ADMIN_COOKIE_DOMAIN}
    cookieSecure  = false
    cookieSecure  = ${?ADMIN_COOKIE_SECURE}
    expirationSeconds = 86400
  }
}
