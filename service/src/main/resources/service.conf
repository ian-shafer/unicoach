coaching {
  model = "claude-sonnet-4-6"
  model = ${?COACHING_MODEL}
  maxTokens = 4096
  maxTokens = ${?COACHING_MAX_TOKENS}
  systemPromptName = "coach"
  systemPromptName = ${?COACHING_SYSTEM_PROMPT_NAME}
  systemPromptVersion = "v1"
  systemPromptVersion = ${?COACHING_SYSTEM_PROMPT_VERSION}
}

emailVerification {
  tokenTtl = "24 hours"
  tokenTtl = ${?EMAIL_VERIFICATION_TOKEN_TTL}
  verifyUrlBase = "https://unicoach.app/verify-email"
  verifyUrlBase = ${?EMAIL_VERIFICATION_VERIFY_URL_BASE}
}

auth {
  google {
    provider = "google"                 # "google" | "stub"
    provider = ${?GOOGLE_AUTH_PROVIDER}
    clientIds = []                       # accepted audiences; required when provider = "google"
    clientIds = ${?GOOGLE_CLIENT_IDS}    # comma-separated
    issuers = ["accounts.google.com", "https://accounts.google.com"]
    jwksUri = "https://www.googleapis.com/oauth2/v3/certs"
    jwksUri = ${?GOOGLE_JWKS_URI}
    clockSkew = "60s"
    connectTimeout = "10s"
    readTimeout = "10s"
  }
}

extraction {
  enabled = true
  enabled = ${?EXTRACTION_ENABLED}

  # Job delay coalescing rapid turns; the watermark makes all-but-the-latest
  # coalesced passes cheap no-ops.
  debounce = 5m
  debounce = ${?EXTRACTION_DEBOUNCE}

  promptName = "extraction"
  promptName = ${?EXTRACTION_PROMPT_NAME}
  promptVersion = "v1"
  promptVersion = ${?EXTRACTION_PROMPT_VERSION}

  model = "claude-sonnet-4-6"
  model = ${?EXTRACTION_MODEL}
  maxTokens = 4096
  maxTokens = ${?EXTRACTION_MAX_TOKENS}

  # Safety cap on turns assembled into one pass.
  windowMaxTurns = 50
  windowMaxTurns = ${?EXTRACTION_WINDOW_MAX_TURNS}

  # Decay half-life (days) for the recency-weighted confidence formula.
  confidenceHalfLifeDays = 30.0
  confidenceHalfLifeDays = ${?EXTRACTION_CONFIDENCE_HALF_LIFE_DAYS}
}
